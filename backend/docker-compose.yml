services:
  kuaimai-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_VERSION: v1.68
    container_name: kuaimai-pda-server
    restart: unless-stopped
    ports:
      - "8900:8900"
    env_file:
      - .env.docker.example
    volumes:
      - ./data:/data
    deploy:
      resources:
        limits:
          memory: 512MiB
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
